version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    # Porta do banco fica fechada para o mundo, só o Django acessa internamente

  web:
    build: .
    command: python manage.py migrate && gunicorn seu_projeto.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

volumes:
  postgres_data: